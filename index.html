<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amine Store | متجري الاحترافي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Amine Store</h1>
        <p>جودة، أناقة، وسرعة في التوصيل</p>
    </header>
    
    <main class="container" id="products-grid">
        <div id="loader">جاري تحميل أحدث المنتجات...</div>
    </main>

    <div id="modalOverlay" class="overlay">
        <div class="modal-card">
            <span class="close-icon" onclick="closeForm()">&times;</span>
            <h2>تأكيد الطلب</h2>
            <form id="orderForm">
                <input type="hidden" id="p_id" name="Product_ID">
                <input type="hidden" id="p_name" name="Product_Name">
                
                <input type="text" name="Customer_Name" placeholder="اسمك الكامل" required>
                <input type="tel" name="Phone_Number" placeholder="رقم هاتفك" required>
                <input type="text" name="Shipping_Address" placeholder="عنوانك الكامل (الولاية/البلدية)" required>
                
                <button type="submit" id="submitBtn">تأكيد الشراء الآن</button>
            </form>
        </div>
    </div>

    <div id="successOverlay" class="overlay">
        <div class="modal-card success-card">
            <div class="checkmark-circle"><div class="checkmark draw"></div></div>
            <h2>تم استلام طلبك بنجاح!</h2>
            <p id="orderSummary"></p>
            <button onclick="closeSuccess()" class="done-btn">إغلاق</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
