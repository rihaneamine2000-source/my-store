<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Reset Password</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', sans-serif; color: white; }
        .login-box { width: 400px; padding: 40px; background: rgba(255, 255, 255, 0.1); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; }
        .input-group { position: relative; margin-bottom: 30px; }
        .input-group input { width: 100%; padding: 10px 0; font-size: 16px; color: white; border: none; border-bottom: 1px solid white; outline: none; background: transparent; }
        .input-group label { position: absolute; top: 0; left: 0; padding: 10px 0; pointer-events: none; transition: .5s; }
        .input-group input:focus ~ label, .input-group input:valid ~ label { top: -20px; font-size: 12px; color: #bdc3c7; }
        button { width: 100%; padding: 12px; background: #5c67f2; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .options { display: flex; justify-content: space-between; font-size: 12px; margin: 20px 0; }
        .options a { color: white; text-decoration: none; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal { width: 350px; background: #2d3436; padding: 30px; border-radius: 15px; border: 1px solid #636e72; text-align: center; }
        .modal h3 { margin-top: 0; color: #5c67f2; }
        .modal p { font-size: 13px; color: #b2bec3; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #1e272e; color: white; box-sizing: border-box; }
        .modal .step { display: none; }
        .modal .step.active { display: block; }
        .close-btn { background: transparent; color: #ff7675; border: none; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>LOGIN</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" required>
                <label>Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label>Password</label>
            </div>
            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="javascript:void(0)" onclick="openResetModal()">Forgot Password?</a>
            </div>
            <button type="submit" id="loginBtn">LOGIN</button>
        </form>
    </div>

    <div class="overlay" id="resetOverlay">
        <div class="modal">
            <h3 id="modalTitle">Reset Password</h3>
            
            <div class="step active" id="stepEmail">
                <p>Enter your admin email to receive OTP</p>
                <input type="email" id="resetEmail" placeholder="example@mail.com">
                <button onclick="requestOTP()" id="sendOtpBtn">Send Code</button>
            </div>

            <div class="step" id="stepOTP">
                <p>Enter the 6-digit code sent to your email</p>
                <input type="text" id="otpCode" placeholder="Enter OTP">
                <button onclick="verifyAndNext()" id="verifyBtn">Verify & Proceed</button>
            </div>

            <div class="step" id="stepNewPass">
                <p>Enter your new strong password</p>
                <input type="password" id="newPassword" placeholder="New Password">
                <button onclick="submitNewPassword()" id="updateBtn">Update Password</button>
            </div>

            <button class="close-btn" onclick="closeResetModal()">Cancel</button>
        </div>
    </div>

<script>
    // هام: تأكد من تحديث هذا الرابط بعد كل New Deployment
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzT4ARQ6dI1RZ5b7VC1uFSuPIQascJY5SjxZqL3817WDHZZrhNKahOj5XYkgu3FMSdztw/exec";

    function openResetModal() { document.getElementById('resetOverlay').style.display = 'flex'; }
    function closeResetModal() { document.getElementById('resetOverlay').style.display = 'none'; }

    function switchStep(stepId) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
    }

    function requestOTP() {
        const email = document.getElementById('resetEmail').value;
        if (!email) return alert("Please enter email");
        const btn = document.getElementById('sendOtpBtn');
        btn.innerText = "Checking..."; btn.disabled = true;

        callApi(`?action=sendOTP&email=${encodeURIComponent(email)}`, (res) => {
            if (res.result === "OTPSent") {
                alert("Success! Check your inbox.");
                switchStep('stepOTP');
            } else {
                alert("Email not found!");
                btn.innerText = "Send Code"; btn.disabled = false;
            }
        });
    }

    // هنا التصليح: التحقق من الرمز يحدث عند الضغط على Update Password مباشرة لضمان الدقة
    function verifyAndNext() {
        const otp = document.getElementById('otpCode').value;
        if (otp.length < 6) return alert("Enter valid 6-digit code");
        switchStep('stepNewPass');
    }

    function submitNewPassword() {
        const otp = document.getElementById('otpCode').value;
        const newPass = document.getElementById('newPassword').value;
        const btn = document.getElementById('updateBtn');

        if (!newPass) return alert("Enter new password");
        btn.innerText = "Updating..."; btn.disabled = true;

        callApi(`?action=resetPass&otp=${otp}&newPass=${encodeURIComponent(newPass)}`, (res) => {
            if (res.result === "ResetSuccess") {
                alert("Password changed! You can login now.");
                location.reload();
            } else {
                alert("Invalid OTP! Try again.");
                btn.innerText = "Update Password"; btn.disabled = false;
                switchStep('stepOTP');
            }
        });
    }

    function callApi(params, callbackFn) {
        const callbackName = 'cb_' + Math.floor(Math.random() * 1000000);
        window[callbackName] = function(res) {
            callbackFn(res);
            document.body.removeChild(script);
            delete window[callbackName];
        };
        const script = document.createElement('script');
        script.src = scriptUrl + params + "&callback=" + callbackName;
        document.body.appendChild(script);
    }

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        btn.innerText = "VERIFYING..."; btn.disabled = true;

        callApi(`?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`, (res) => {
            if (res.result === "Success") {
                window.location.href = "admin-dashboard.html";
            } else {
                alert("Access Denied!");
                btn.innerText = "LOGIN"; btn.disabled = false;
            }
        });
    };
</script>
</body>
</html>
