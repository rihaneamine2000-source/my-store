<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        /* إعدادات الخلفية والصفحة كاملة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* صندوق الزجاج */
        .login-box {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .login-box h2 {
            margin: 0 0 30px;
            font-size: 2em;
            letter-spacing: 2px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: white;
            border: none;
            border-bottom: 1px solid white;
            outline: none;
            background: transparent;
        }

        .input-group label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px 0;
            font-size: 16px;
            color: white;
            pointer-events: none;
            transition: .5s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px;
            font-size: 12px;
            color: #bdc3c7;
        }

        button {
            position: relative;
            display: inline-block;
            padding: 10px 20px;
            color: #fff;
            background: #5c67f2;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: .5s;
            width: 100%;
        }

        button:hover {
            background: #4a54e1;
            box-shadow: 0 0 10px #5c67f2;
        }

        .options {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 14px;
            margin: 20px 0;
        }

        .options a { color: white; text-decoration: none; }
        .options a:hover { text-decoration: underline; }

        /* --- تنسيق رسالة الخطأ تحت الزر --- */
        #error-msg {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 71, 87, 0.2); /* أحمر شفاف */
            border: 1px solid rgba(255, 71, 87, 0.4);
            color: #ffcbd1;
            font-size: 14px;
            display: none; /* مخفية افتراضياً */
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.3s ease-in;
        }

        .icon-x {
            background: #ff4757;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>LOGIN</h2>
        <form>
            <div class="input-group">
                <input type="text" id="username" required>
                <label>Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label>Password</label>
            </div>
            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" id="loginBtn">LOGIN</button>
            
            <div id="error-msg">
                <span class="icon-x">✕</span>
                <span id="error-text">Access Denied</span>
            </div>
        </form>
    </div>

<script>
    // رابط الـ Web App الخاص بك
    var scriptUrl = "https://script.google.com/macros/s/AKfycbzgYjd7fNJaHgg-rbptutMStoozrjeHTqTRu5AZpxMIHgjNIGv7BgjcurnypOm8aqlyTA/exec";

    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var user = document.getElementById('username').value;
        var pass = document.getElementById('password').value;
        var button = document.getElementById('loginBtn');
        var errorDiv = document.getElementById('error-msg');
        var errorText = document.getElementById('error-text');

        // إخفاء رسالة الخطأ السابقة
        errorDiv.style.display = 'none';
        
        button.innerText = "VERIFYING...";
        button.disabled = true;

        var callbackName = 'loginCallback';
        window[callbackName] = function(response) {
            if (response.result === "Success") {
                // في حالة النجاح، يمكننا استخدام alert سريع أو تحويل مباشر
                window.location.href = "admin-dashboard.html";
            } else {
                // إظهار رسالة الخطأ تحت الزر
                errorText.innerText = "Wrong Username or Password";
                errorDiv.style.display = 'flex';
                
                button.innerText = "LOGIN";
                button.disabled = false;
            }
            // تنظيف
            document.body.removeChild(script);
            delete window[callbackName];
        };

        var script = document.createElement('script');
        script.src = scriptUrl + "?username=" + encodeURIComponent(user) + 
                     "&password=" + encodeURIComponent(pass) + 
                     "&callback=" + callbackName;
        document.body.appendChild(script);
    });
</script>
</body>
</html>
